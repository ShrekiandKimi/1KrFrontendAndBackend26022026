<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="product-card">
        <img src="https://via.placeholder.com/300x200" alt="Фото товара" class="product-card__image">
        <h2 class="product-card__title">Смартфон XYZ</h2>
        <p class="product-card__description">Современный смартфон с отличной камерой и мощным процессором.</p>
        <div class="product-card__footer">
            <span class="product-card__price">29 990 ₽</span>
            <button class="product-card__button">Купить</button>
        </div>
    </div>
</body>
</html>
